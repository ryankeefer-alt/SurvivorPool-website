<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>March Madness Knockout Pool 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Karla:wght@300;400;500;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #080808;
      --surface: #111111;
      --raised:  #1a1a1a;
      --float:   #222222;
      --border:  rgba(255,255,255,0.08);
      --accent:  #F4631F;
      --gold:    #FFB800;
      --cream:   #F2E8D9;
      --text:    #F2E8D9;
      --muted:   #8a7a6a;
      --dim:     #4a3a2a;
      --success: #4ade80;
      --danger:  #f87171;
      --warn:    #FFB800;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Karla', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.7;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .anton { font-family: 'Anton', sans-serif; letter-spacing: 0.02em; }
    .mono { font-family: 'Courier Prime', monospace; }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes bounce-ball {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      30%       { transform: translateY(-22px) rotate(-15deg); }
      60%       { transform: translateY(0) rotate(5deg); }
      80%       { transform: translateY(-8px) rotate(-5deg); }
    }
    @keyframes spin-ball {
      0%   { transform: rotate(0deg) scale(1); }
      25%  { transform: rotate(90deg) scale(1.06); }
      50%  { transform: rotate(180deg) scale(1); }
      75%  { transform: rotate(270deg) scale(1.06); }
      100% { transform: rotate(360deg) scale(1); }
    }
    @keyframes glow-pulse {
      0%, 100% { opacity: .6; }
      50%       { opacity: 1; }
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }
    .logo-title {
      background: linear-gradient(135deg, #FF1744 0%, #FFFFFF 30%, #448AFF 55%, #FFFFFF 75%, #FF1744 100%);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 6s ease-in-out infinite;
      text-shadow: none;
    }
    .logo-sub {
      background: linear-gradient(90deg, #448AFF 0%, #FFFFFF 35%, #FF1744 65%, #448AFF 100%);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s ease-in-out infinite;
      text-shadow: none;
    }
    /* ── Mobile responsive ── */
    @media (max-width: 480px) {
      .site-header .header-inner { padding: 0 10px !important; }
      .nav-tab { padding: 12px 12px; font-size: 11px; gap: 4px; }
      .card-header { padding: 14px 14px 12px; flex-wrap: wrap; gap: 8px; }
      .card-title { font-size: 13px; }
      .player-row { padding: 12px 14px; gap: 10px; flex-wrap: wrap; }
      .game-row { padding: 12px 14px; }
      .admin-table th { padding: 8px 8px; font-size: 10px; }
      .admin-table td { padding: 10px 8px; font-size: 12px; }
      .btn { padding: 9px 16px; font-size: 13px; }
      .badge { padding: 2px 7px; font-size: 10px; }
      .form-input, .form-select { padding: 10px 12px; font-size: 13px; }
      .venmo-bar { font-size: 11px; padding: 4px 8px; }
      .stat-card { padding: 14px !important; }
    }
    @media (max-width: 380px) {
      .nav-tab { padding: 10px 8px; font-size: 10px; }
    }

    .anim-up   { animation: fadeUp .45s cubic-bezier(.22,1,.36,1) both; }
    .anim-up-1 { animation-delay:  60ms; }
    .anim-up-2 { animation-delay: 120ms; }
    .anim-up-3 { animation-delay: 180ms; }
    .anim-up-4 { animation-delay: 240ms; }
    .anim-up-5 { animation-delay: 300ms; }
    .anim-up-6 { animation-delay: 360ms; }
    .anim-up-7 { animation-delay: 420ms; }

    /* ── Court texture ── */
    .court-texture {
      background-color: var(--bg);
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(255,255,255,.03) 59px, rgba(255,255,255,.03) 60px),
        repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,.03) 59px, rgba(255,255,255,.03) 60px);
    }

    /* ── Header ── */
    .site-header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(8,8,8,.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    .header-flame {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 70% 200% at 80% 50%, rgba(244,99,31,.14) 0%, transparent 65%);
    }

    /* ── Nav ── */
    .nav-tab {
      display:flex; align-items:center; gap:7px;
      padding: 14px 20px; font-size: 13px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--muted); cursor: pointer; white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
    }
    .nav-tab:hover { color: var(--cream); }
    .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .card-header {
      padding: 18px 22px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-title {
      font-family: 'Anton', sans-serif;
      font-size: 15px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--cream);
    }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 4px;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .badge-alive   { background: rgba(74,222,128,.12); color: var(--success); border: 1px solid rgba(74,222,128,.25); }
    .badge-out     { background: rgba(248,113,113,.1); color: var(--danger);  border: 1px solid rgba(248,113,113,.2); }
    .badge-buyback { background: rgba(255,184,0,.12);  color: var(--gold);    border: 1px solid rgba(255,184,0,.25); }
    .badge-win     { background: rgba(74,222,128,.12); color: var(--success); border: 1px solid rgba(74,222,128,.25); }
    .badge-loss    { background: rgba(248,113,113,.1); color: var(--danger);  border: 1px solid rgba(248,113,113,.2); }
    .badge-pending { background: rgba(255,184,0,.1);  color: var(--gold);    border: 1px solid rgba(255,184,0,.2);  }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px; border-radius: 8px; border: none; cursor: pointer;
      font-family: 'Karla', sans-serif; font-size: 14px; font-weight: 700;
      letter-spacing: 0.04em;
      transition: transform .15s, box-shadow .15s, opacity .15s;
    }
    .btn:hover   { transform: translateY(-1px); }
    .btn:active  { transform: translateY(0); }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 20px rgba(244,99,31,.4), 0 1px 3px rgba(0,0,0,.5);
    }
    .btn-primary:hover {
      box-shadow: 0 6px 28px rgba(244,99,31,.55), 0 2px 6px rgba(0,0,0,.5);
    }
    .btn-gold {
      background: var(--gold);
      color: #111;
      box-shadow: 0 4px 20px rgba(255,184,0,.35), 0 1px 3px rgba(0,0,0,.5);
    }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,.2); }

    /* ── Game rows ── */
    .game-row {
      padding: 14px 22px;
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    .game-row:last-child { border-bottom: none; }
    .game-row:hover { background: rgba(255,255,255,.025); }

    /* ── Player rows ── */
    .player-row {
      padding: 14px 22px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px;
      transition: background .15s;
    }
    .player-row:last-child { border-bottom: none; }
    .player-row:hover { background: rgba(255,255,255,.025); }

    /* ── Form ── */
    .form-label {
      display: block;
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 6px;
    }
    .form-input, .form-select {
      width: 100%; padding: 11px 14px;
      background: var(--raised); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: 'Karla', sans-serif; font-size: 14px;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(244,99,31,.15);
    }
    .form-input::placeholder { color: var(--muted); }
    .form-select option { background: var(--raised); }

    /* ── Admin table ── */
    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table th {
      padding: 10px 14px; text-align: left;
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); border-bottom: 1px solid var(--border);
    }
    .admin-table td {
      padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,.04);
      font-size: 13.5px; vertical-align: middle;
    }
    .admin-table tr:hover td { background: rgba(255,255,255,.025); }

    /* ── Venmo banner ── */
    .venmo-bar {
      background: linear-gradient(135deg, #008CFF 0%, #00B3FF 100%);
      padding: 3px 0; text-align: center;
      font-size: 12px; font-weight: 700; letter-spacing: 0.05em;
      color: #fff;
    }

    /* ── Scoreboard ── */
    .score-pill {
      font-family: 'Courier Prime', monospace;
      font-size: 13px; font-weight: 700;
      min-width: 26px; text-align: center;
      padding: 2px 8px;
      background: var(--raised); border-radius: 4px;
      border: 1px solid var(--border);
    }

    /* ── Rules ── */
    .rule-card {
      background: var(--raised);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 14px 18px;
    }
    .rule-card.gold { border-left-color: var(--gold); }

    /* ── Toggle ── */
    .toggle-pill {
      display: inline-flex;
      background: var(--raised);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 3px;
    }
    .toggle-opt {
      padding: 6px 16px; border-radius: 100px; cursor: pointer;
      font-size: 12px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--muted); transition: all .2s;
    }
    .toggle-opt.active { background: var(--accent); color: #fff; }

    /* ── Tabs ── */
    .subtab {
      padding: 8px 16px; border-radius: 6px; cursor: pointer;
      font-size: 12px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--muted); transition: all .2s;
    }
    .subtab.active { background: var(--raised); color: var(--text); }
    .subtab:hover:not(.active) { color: var(--cream); }

    /* ── Divider ── */
    .divider { border: none; border-top: 1px solid var(--border); }

    /* ── Pool stat cards ── */
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
    }
    .stat-card.orange::before { background: var(--accent); }
    .stat-card.gold::before   { background: var(--gold); }
    .stat-card.green::before  { background: var(--success); }
    .stat-card.red::before    { background: #ef4444; }
    .stat-card.blue::before   { background: #3b82f6; }
    .stat-card.white::before  { background: #e5e7eb; }
  </style>
</head>
<body class="court-texture">

<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useCallback, useEffect } = React;

/* ────────────────────────────────
   SVG Basketball Component
──────────────────────────────── */
const Basketball = ({ size = 60, bounce = false, spin = false, className = '', glow = false }) => (
  <div
    className={className}
    style={{
      width: size, height: size, flexShrink: 0,
      animation: spin
        ? 'spin-ball 2.4s cubic-bezier(.4,0,.6,1) infinite'
        : bounce ? 'bounce-ball 1.8s cubic-bezier(.36,.07,.19,.97) infinite' : 'none',
      filter: glow ? `drop-shadow(0 0 ${size * 0.18}px rgba(244,99,31,.75)) drop-shadow(0 0 ${size * 0.35}px rgba(244,99,31,.3))` : 'none',
    }}
  >
    <svg viewBox="0 0 100 100" width={size} height={size}>
      <defs>
        <radialGradient id={`bg${size}`} cx="38%" cy="32%">
          <stop offset="0%"   stopColor="#FF8C42" />
          <stop offset="45%"  stopColor="#F4631F" />
          <stop offset="100%" stopColor="#B33A00" />
        </radialGradient>
        <radialGradient id={`shine${size}`} cx="32%" cy="28%">
          <stop offset="0%"   stopColor="rgba(255,255,255,.35)" />
          <stop offset="100%" stopColor="rgba(255,255,255,0)" />
        </radialGradient>
        <clipPath id={`clip${size}`}>
          <circle cx="50" cy="50" r="47" />
        </clipPath>
      </defs>
      <circle cx="50" cy="50" r="47" fill={`url(#bg${size})`} />
      <g clipPath={`url(#clip${size})`} stroke="#7A2400" strokeWidth="2" fill="none">
        <line x1="50" y1="3"  x2="50" y2="97" />
        <line x1="3"  y1="50" x2="97" y2="50" />
        <path d="M20 14 Q50 50 20 86" />
        <path d="M80 14 Q50 50 80 86" />
      </g>
      <circle cx="50" cy="50" r="47" fill={`url(#shine${size})`} />
      <circle cx="50" cy="50" r="47" stroke="rgba(0,0,0,.25)" strokeWidth="1.5" fill="none" />
    </svg>
  </div>
);

/* ────────────────────────────────
   Avatar Component
──────────────────────────────── */
const Avatar = ({ name, size = 38 }) => {
  const parts = (name || '?').trim().split(/\s+/);
  const initials = parts.length >= 2
    ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
    : parts[0][0].toUpperCase();
  const colors = [
    ['#F4631F','#B33A00'],['#FFB800','#CC8800'],['#FF6B6B','#C0392B'],
    ['#4ECDC4','#1A7A75'],['#95E1D3','#2D8C7A'],['#F38181','#C0392B'],
    ['#A8E6CF','#2E7D5B'],['#FFD93D','#CC9900'],
  ];
  const idx = name ? name.charCodeAt(0) % colors.length : 0;
  const [c1, c2] = colors[idx];
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      background: `radial-gradient(circle at 35% 35%, ${c1}, ${c2})`,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      flexShrink: 0,
      boxShadow: `0 2px 8px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.15)`,
      fontFamily: "'Anton', sans-serif",
      fontSize: size * 0.36 + 'px',
      color: '#fff',
      letterSpacing: '0.02em',
    }}>
      {initials}
    </div>
  );
};

/* ────────────────────────────────
   STATIC LABELS (display only)
──────────────────────────────── */
const DAY_ORDER = [
  'thursday_r1','friday_r1','saturday_r2','sunday_r2',
  'thursday_s16','friday_s16','saturday_e8','sunday_e8',
  'saturday_ff','monday_champ'
];
const DAY_LABELS = {
  thursday_r1:'Thu R1', friday_r1:'Fri R1', saturday_r2:'Sat R2', sunday_r2:'Sun R2',
  thursday_s16:'Thu S16', friday_s16:'Fri S16', saturday_e8:'Sat E8', sunday_e8:'Sun E8',
  saturday_ff:'Sat FF', monday_champ:'Mon Champ'
};
const DAY_FULL = {
  thursday_r1:'Thursday — Round of 64', friday_r1:'Friday — Round of 64',
  saturday_r2:'Saturday — Round of 32', sunday_r2:'Sunday — Round of 32',
  thursday_s16:'Thursday — Sweet 16', friday_s16:'Friday — Sweet 16',
  saturday_e8:'Saturday — Elite 8', sunday_e8:'Sunday — Elite 8',
  saturday_ff:'Saturday — Final Four', monday_champ:'Monday — Championship'
};

const PICKS_PER_DAY = {
  thursday_r1: 2, friday_r1: 2,
  saturday_r2: 1, sunday_r2: 1,
  thursday_s16: 1, friday_s16: 1,
  saturday_e8: 1, sunday_e8: 1,
  saturday_ff: 1, monday_champ: 1,
};

const BUYBACK_PICKS = {
  friday_r1: 4,
  saturday_r2: 3,
  sunday_r2: 3,
};

const BUYBACK_DAYS = new Set(['friday_r1', 'saturday_r2', 'sunday_r2']);

const RULES_DATA = [
  {
    id:'r1', day:`Thursday R1`, color:'orange',
    heading:`Two Picks Required`,
    body:`Pick TWO winners on Thursday. Both must win outright. If either loses, you're eliminated — but you can buy back in for $25. If you buy back after Thursday, you must pick FOUR winners on Friday.`
  },
  {
    id:'r2', day:`Friday R1`, color:'orange',
    heading:`Two More Picks`,
    body:`If you survived Thursday, pick TWO more winners on Friday. If you lost Thursday and bought back in, you need FOUR winners Friday. Lose Friday and you can buy back in for Saturday — but you'll need THREE that day.`
  },
  {
    id:'r3', day:`Saturday R2`, color:'gold',
    heading:`One Pick (or Three on Buyback)`,
    body:`If you nailed Friday, pick just ONE winner Saturday. If you're buying back in after a Friday loss, pick THREE Saturday and go 3-for-3. Max buybacks is three and no buybacks after Sunday.`
  },
  {
    id:'r4', day:`Sunday R2`, color:'gold',
    heading:`One Pick (or Three on Buyback)`,
    body:`Same deal as Saturday. Survived Saturday? Pick one. Buying back in after a Saturday loss? Pick three — and go 3-for-3 to stay alive. This is your last chance to buy back in.`
  },
  {
    id:'r5', day:`Sweet 16 onward`, color:'orange',
    heading:`One Pick Per Day`,
    body:`From here on out you pick ONE winner per day. No more buybacks. Last person standing takes the pot. If multiple people survive, they can split or keep playing.`
  },
  {
    id:'r6', day:`All Rounds`, color:'gold',
    heading:`No Team Reuse`,
    body:`You cannot pick the same team twice — ever. Even if you buy back in, those previous picks are locked out. If you run out of eligible teams to pick, you automatically advance but lose that day (you still need to be beaten by someone who makes a successful pick).`
  },
];

const TEAMS_BY_DAY_DEFAULT = {
  thursday_r1: [
    'Alabama State','Arkansas','Auburn','BYU','Clemson','Creighton','Drake',
    'Georgia','Gonzaga','High Point','Houston','Kansas','Louisville',
    'McNeese State','Michigan','Missouri','Montana','Omaha','Purdue',
    'SIU Edwardsville',"St. John's",'Tennessee','Texas A&M','Texas Tech',
    'UC San Diego','UCLA','UNC Wilmington','Utah State','VCU',
    'Wisconsin','Wofford','Yale'
  ],
  friday_r1: [],
};

/* ────────────────────────────────
   MAIN APP
──────────────────────────────── */
function App() {
  const [activeTab, setActiveTab]   = useState('standings');
  const [players,   setPlayers]     = useState([]);
  const [gamesData, setGamesData]   = useState({});
  const [closedDays, setClosedDays] = useState(new Set());
  const [submissionDay, setSubmissionDay] = useState('thursday_r1');
  const [teamsData, setTeamsData]   = useState(TEAMS_BY_DAY_DEFAULT);
  const [loading, setLoading]       = useState(true);
  const [isAdmin, setIsAdmin]       = useState(false);
  const [showAdminLogin, setShowAdminLogin] = useState(false);
  const [adminPin, setAdminPin] = useState('');
  const [adminErr, setAdminErr] = useState('');

  // ── Load data from API on mount ──
  const fetchState = useCallback(() => {
    fetch('/api/state')
      .then(r => r.json())
      .then(data => {
        setPlayers(data.players || []);
        setGamesData(data.games || {});
        if (data.config) {
          setClosedDays(new Set(data.config.closedDays || []));
          setSubmissionDay(data.config.currentDay || 'thursday_r1');
        }
        if (data.teams) setTeamsData(data.teams);
        setLoading(false);
      })
      .catch(err => { console.error('Failed to load state:', err); setLoading(false); });
  }, []);

  useEffect(() => { fetchState(); }, [fetchState]);

  // ── Compute winners from games data ──
  const WINNERS_BY_DAY = useMemo(() => {
    const w = {};
    Object.entries(gamesData).forEach(([day, games]) => {
      w[day] = new Set(games.filter(g => g.final && g.winner).map(g => g.winner));
    });
    return w;
  }, [gamesData]);

  const entriesClosed = closedDays.has(submissionDay);

  // ── Admin login ──
  const handleAdminLogin = () => {
    fetch('/api/admin/lock', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ day: submissionDay, action: 'verify', pin: adminPin })
    })
    .then(r => r.json())
    .then(data => {

      // Auto-save to server when a game is marked final

  const handleImport = () => {

    fetch('/api/admin/import', {

  const handleImportFile = (e) => {

  const alivePlayers = useMemo(() => players.filter(p => p.status === 'alive'), [players]);
  const eliminatedPlayers = useMemo(() => players.filter(p => p.status === 'eliminated'), [players]);

  // ── Pool-over detection ──
  // If all alive players have no available teams or are all forced into the same pick(s), pool is over
  const poolResult = useMemo(() => {
    if (alivePlayers.length === 0) return null;
    // Single player left — they win
    if (alivePlayers.length === 1) {
      return { finished: true, winners: [alivePlayers[0].name], reason: 'Last player standing!' };
    }
    // Only check if current day has teams (games imported)
    const nextTeams = teamsData[submissionDay] || [];
    if (nextTeams.length === 0) return null;
    // Only check players who haven't submitted picks for the current day yet
    const needPicks = alivePlayers.filter(p => !p.picks[submissionDay]);
    // If everyone already submitted picks, no check needed yet
    if (needPicks.length === 0) return null;

    const picksPerDay = PICKS_PER_DAY[submissionDay] || 1;
    const playerAvailable = needPicks.map(p => {
      const used = [];
      Object.values(p.picks || {}).forEach(dayPicks => {
        dayPicks.forEach(t => { if (t !== 'None' && used.indexOf(t) === -1) used.push(t); });
      });
      return nextTeams.filter(t => used.indexOf(t) === -1).sort();
    });

    const allEmpty = playerAvailable.every(teams => teams.length === 0);
    if (allEmpty) {
      return { finished: true, winners: needPicks.map(p => p.name), reason: 'No teams left for any remaining player.' };
    }

    // Check if all players are forced into the exact same pick(s)
    // Only applies when each player has exactly the required number of teams left
    const allForced = playerAvailable.every(teams => teams.length === picksPerDay);
    if (allForced) {
      const firstPicks = playerAvailable[0].join(',');
      const allSame = playerAvailable.every(teams => teams.join(',') === firstPicks);
      if (allSame) {
        return { finished: true, winners: needPicks.map(p => p.name), reason: `All remaining players must pick ${playerAvailable[0].join(' & ')}. Same outcome for everyone.` };
      }
    }

    return null;
  }, [alivePlayers, teamsData, submissionDay]);

  // Check if an eliminated player can buy back (only the round immediately after their loss)
  const canBuyback = useCallback((player) => {
    if (player.status !== 'eliminated' || player.needsBuyback) return false;
    if (!BUYBACK_DAYS.has(submissionDay)) return false;
    if (player.buybacks >= 3) return false;
    const currentIdx = DAY_ORDER.indexOf(submissionDay);
    // Find the day they were last eliminated
    for (let d = DAY_ORDER.length - 1; d >= 0; d--) {
      if (player.results[DAY_ORDER[d]] === 'loss') {
        return currentIdx === d + 1; // only buyback the day right after the loss
      }
    }
    return false;
  }, [submissionDay]);

  // ── Pick distribution for bar chart (only computed when entries are closed) ──
  const pickDistribution = useMemo(() => {
    if (!entriesClosed || players.length === 0) return [];
    const counts = {};
    players.forEach(p => {
      const dayPicks = p.picks[submissionDay] || [];
      dayPicks.forEach(team => {
        counts[team] = (counts[team] || 0) + 1;
      });
    });
    return Object.entries(counts)
      .map(([team, count]) => ({ team, count }))
      .sort((a, b) => b.count - a.count || a.team.localeCompare(b.team));
  }, [players, submissionDay, entriesClosed]);

  const getPickBadgeClass = (team, day) => {
    const winners = WINNERS_BY_DAY[day];
    if (!winners || winners.size === 0) return 'badge-pending';
    return winners.has(team) ? 'badge-win' : 'badge-loss';
  };

  // ── Submit Picks State ──
  const [pickerName,      setPickerName]      = useState('');

  const [submitErr,       setSubmitErr]       = useState('');
  const [submitting,      setSubmitting]      = useState(false);

  const matchedPlayer = useMemo(() => {
    if (!pickerName.trim() || submissionDay === 'thursday_r1') return null;
    return players.find(p => p.name.toLowerCase() === pickerName.trim().toLowerCase());
  }, [pickerName, players, submissionDay]);

  const requiredPicks = useMemo(() => {
    if (matchedPlayer && matchedPlayer.needsBuyback && BUYBACK_PICKS[submissionDay]) {
      return BUYBACK_PICKS[submissionDay];
    }
    return PICKS_PER_DAY[submissionDay] || 1;
  }, [matchedPlayer, submissionDay]);

  // Teams the matched player already used in previous days (cannot reuse)
  const usedTeams = useMemo(() => {
    if (!matchedPlayer) return [];
    const used = [];
    Object.values(matchedPlayer.picks || {}).forEach(dayPicks => {
      dayPicks.forEach(t => { if (used.indexOf(t) === -1) used.push(t); });
    });
    return used;
  }, [matchedPlayer]);

  // Available teams = current day teams minus already-used teams
  const availableTeams = useMemo(() => {

  }, [currentTeams, usedTeams]);

    const isNonePick = teamPicks.length === 1 && teamPicks[0] === 'None';
    if (!isNonePick && teamPicks.filter(t => t).length < requiredPicks) { setSubmitErr(`Please select ${requiredPicks} team${requiredPicks > 1 ? 's' : ''}.`); return; }
    if (!isNonePick && new Set(teamPicks).size < teamPicks.length) { setSubmitErr('You must pick different teams.'); return; }

    fetch('/api/picks', {

               onClick={e => e.stopPropagation()}>

                <div style={{fontSize:11, color:'var(--muted)', marginTop:6, letterSpacing:'0.08em', textTransform:'uppercase'}}>Eliminated</div>
              </div>
              <div className="stat-card white anim-up anim-up-3">
                <div className="mono" style={{fontSize:28, fontWeight:700, color:'#e5e7eb', lineHeight:1}}>{DAY_LABELS[submissionDay]}</div>
                <div style={{fontSize:11, color:'var(--muted)', marginTop:6, letterSpacing:'0.08em', textTransform:'uppercase'}}>Current Round</div>
              </div>
            </div>

            {/* Pool Over Banner */}
            {poolResult && poolResult.finished && (
              <div className="card anim-up" style={{

                border:'2px solid var(--gold)', textAlign:'center', padding:'32px 22px',
              }}>
                <div style={{fontSize:48, marginBottom:12}}>🏆</div>
                <div className="anton" style={{fontSize:28, color:'var(--gold)', letterSpacing:'0.04em', lineHeight:1.2}}>
                  POOL OVER — {poolResult.winners.length > 1 ? 'TIE' : 'WINNER'}!
                </div>
                <div style={{color:'var(--cream)', marginTop:12, fontSize:16, fontWeight:700}}>
                  {poolResult.winners.join(', ')}

                <div style={{color:'var(--muted)', marginTop:8, fontSize:13}}>

            {players.length === 0 ? (

                  <button className="btn btn-primary" style={{marginTop:16}} onClick={() => handleTabChange('picks')}>
                    Submit Picks
                  </button>

              </div>

              background:'rgba(255,184,0,.06)', border:'1px solid rgba(255,184,0,.2)', borderRadius:10
            }}>
              <div className="anton" style={{fontSize:14, color:'var(--gold)', letterSpacing:'0.08em', marginBottom:8}}>
                ENTRY FEE & BUYBACKS
              </div>
              <div style={{color:'var(--muted)', fontSize:14, lineHeight:1.65, marginBottom:14}}>
                Entry is $25. Each buyback costs another $25. Max three buybacks total, no buybacks after Sunday R2.
                Winner takes the entire pot. Multiple survivors can split or keep playing.
              </div>
              <a href="https://www.venmo.com/Ryan-Keefer-2" target="_blank" rel="noopener noreferrer">
                <button className="btn btn-gold">Pay via Venmo</button>
              </a>
            </div>
          </div>
        )}

        {/* ── ADMIN CONSOLE ── */}
        {activeTab === 'admin' && isAdmin && (
          <div className="anim-up">
            <div style={{display:'flex', alignItems:'flex-end', gap:20, marginBottom:24}}>
              <div>
                <div className="anton" style={{fontSize:'clamp(28px, 8vw, 42px)', color:'var(--cream)', lineHeight:1, letterSpacing:'0.03em'}}>
                  ADMIN CONSOLE
                </div>
                <div style={{color:'var(--muted)', fontSize:14, marginTop:6}}>
                  Manage entries, lock days, and advance the tournament.
                </div>
              </div>
            </div>

            {/* Current Day Status */}
            <div className="card anim-up anim-up-1" style={{marginBottom:20}}>
              <div className="card-header">
                <div className="card-title">CURRENT DAY</div>
                <span className={`badge ${entriesClosed ? 'badge-out' : 'badge-alive'}`}>
                  {entriesClosed ? 'LOCKED' : 'OPEN'}
                </span>
              </div>
              <div style={{padding:'22px'}}>
                <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20}}>
                  <div>
                    <div className="anton" style={{fontSize:24, color:'var(--cream)', letterSpacing:'0.04em'}}>
                      {DAY_FULL[submissionDay] || DAY_LABELS[submissionDay]}
                    </div>
                    <div style={{fontSize:13, color:'var(--muted)', marginTop:4}}>
                      {players.filter(p => p.picks && p.picks[submissionDay]).length} picks submitted
                      {' · '}
                      {players.length} total entries
                      {' · '}
                      ${players.reduce((s, p) => s + p.totalSpent, 0)} pot
                    </div>
                  </div>
                </div>

                <div style={{display:'flex', gap:12, flexWrap:'wrap'}}>
                  {entriesClosed ? (
                    <button className="btn btn-gold" onClick={() => handleUnlockDay(submissionDay)}>
                      🔓 Unlock {DAY_LABELS[submissionDay]} Entries
                    </button>
                  ) : (
                    <button className="btn btn-primary" onClick={() => handleLockDay(submissionDay)}>
                      🔒 Lock {DAY_LABELS[submissionDay]} Entries
                    </button>
                  )}

                  {DAY_ORDER.indexOf(submissionDay) < DAY_ORDER.length - 1 && (
                    <button className="btn btn-ghost" onClick={handleAdvanceDay}>
                      ▶ Advance to {DAY_LABELS[DAY_ORDER[DAY_ORDER.indexOf(submissionDay) + 1]]}
                    </button>
                  )}

                  <button className="btn btn-ghost" onClick={handleResetPool} style={{color:'#ef4444', borderColor:'#ef4444'}}>
                    Reset Pool
                  </button>
                </div>
              </div>
            </div>

            {/* Game Results Editor */}
            {editingGames && editingGames.length > 0 && (
              <div className="card anim-up anim-up-2" style={{marginBottom:20}}>
                <div className="card-header">
                  <div className="card-title">GAME RESULTS — {DAY_LABELS[submissionDay]}</div>
                  <button className="btn btn-primary" style={{padding:'6px 16px', fontSize:12}} onClick={handleSaveGames}>
                    Save &amp; Process Results
                  </button>
                </div>
                <div style={{padding:0}}>
                  {editingGames.map((game, i) => (
                    <div key={game.id} style={{
                      padding:'12px 22px',
                      borderBottom: i < editingGames.length - 1 ? '1px solid var(--border)' : 'none',
                      background: game.final ? 'rgba(74,222,128,.04)' : 'transparent',
                    }}>
                      <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap'}}>
                        {/* Home team */}
                        <div style={{flex:'1 1 120px', minWidth:100}}>
                          <div style={{fontSize:13, fontWeight:game.final && game.winner === game.home ? 700 : 400, color: game.final && game.winner === game.home ? 'var(--success)' : 'var(--cream)'}}>
                            {game.home}
                          </div>
                        </div>

                        {/* Score inputs */}
                        <div style={{display:'flex', alignItems:'center', gap:6}}>
                          <input
                            className="form-input"
                            type="number"
                            value={game.homeScore === null ? '' : game.homeScore}
                            onChange={e => handleGameScoreChange(game.id, 'homeScore', e.target.value === '' ? null : e.target.value)}
                            disabled={game.final}
                            style={{width:55, textAlign:'center', padding:'6px 4px', fontSize:14, fontWeight:700}}
                            placeholder="-"
                          />
                          <span style={{color:'var(--muted)', fontSize:12, fontWeight:700}}>—</span>
                          <input
                            className="form-input"
                            type="number"
                            value={game.awayScore === null ? '' : game.awayScore}
                            onChange={e => handleGameScoreChange(game.id, 'awayScore', e.target.value === '' ? null : e.target.value)}
                            disabled={game.final}
                            style={{width:55, textAlign:'center', padding:'6px 4px', fontSize:14, fontWeight:700}}
                            placeholder="-"
                          />
                        </div>

                        {/* Away team */}
                        <div style={{flex:'1 1 120px', minWidth:100, textAlign:'right'}}>
                          <div style={{fontSize:13, fontWeight:game.final && game.winner === game.away ? 700 : 400, color: game.final && game.winner === game.away ? 'var(--success)' : 'var(--cream)'}}>
                            {game.away}
                          </div>
                        </div>

                        {/* Final toggle */}
                        <div style={{width:80, textAlign:'right'}}>
                          {game.final ? (
                            <button className="badge badge-win" style={{cursor:'pointer', border:'1px solid rgba(74,222,128,.25)'}}
                                    onClick={() => handleUnmarkFinal(game.id)}>
                              FINAL ✓
                            </button>
                          ) : (
                            <button className="badge badge-pending" style={{cursor:'pointer'}}
                                    onClick={() => handleMarkFinal(game.id)}>
                              MARK FINAL
                            </button>
                          )}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{padding:'14px 22px', borderTop:'1px solid var(--border)', display:'flex', justifyContent:'flex-end', alignItems:'center', gap:12}}>
                  {saveNotification && (
                    <span style={{
                      color:'var(--success)', fontSize:14, fontWeight:700,
                      padding:'6px 14px', background:'rgba(74,222,128,.1)',
                      border:'1px solid rgba(74,222,128,.25)', borderRadius:6,
                    }}>✓ {saveNotification}</span>
                  )}
                  <button className="btn btn-primary" onClick={handleSaveGames}>
                    Save &amp; Process Results
                  </button>
                </div>
              </div>
            )}

            {/* Day Status Overview */}
            <div className="card anim-up anim-up-3" style={{marginBottom:20}}>
              <div className="card-header">
                <div className="card-title">DAY STATUS</div>
              </div>
              <div style={{padding:0}}>
                {DAY_ORDER.map((day, i) => {
                  const isCurrent = day === submissionDay;
                  const isLocked = closedDays.has(day);
                  const isPast = DAY_ORDER.indexOf(day) < DAY_ORDER.indexOf(submissionDay);
                  const picksCount = players.filter(p => p.picks && p.picks[day]).length;
                  return (
                    <div key={day} style={{
                      padding:'14px 22px',
                      borderBottom: i < DAY_ORDER.length - 1 ? '1px solid var(--border)' : 'none',
                      display:'flex', alignItems:'center', justifyContent:'space-between',
                      background: isCurrent ? 'rgba(244,99,31,.06)' : 'transparent',
                    }}>
                      <div style={{display:'flex', alignItems:'center', gap:12}}>
                        <span style={{
                          width:8, height:8, borderRadius:'50%',
                          background: isLocked ? 'var(--danger)' : isPast ? 'var(--muted)' : isCurrent ? 'var(--success)' : 'var(--dim)',
                        }} />
                        <span style={{fontSize:13, fontWeight:isCurrent ? 700 : 400, color: isCurrent ? 'var(--cream)' : 'var(--muted)'}}>
                          {DAY_LABELS[day]}
                        </span>
                        {isCurrent && <span className="badge badge-pending" style={{fontSize:9}}>CURRENT</span>}
                      </div>
                      <div style={{display:'flex', alignItems:'center', gap:10}}>
                        <span style={{fontSize:12, color:'var(--muted)'}}>{picksCount} picks</span>
                        <span className={`badge ${isLocked ? 'badge-out' : isPast ? 'badge-buyback' : 'badge-alive'}`} style={{fontSize:9}}>
                          {isLocked ? 'LOCKED' : isPast ? 'PAST' : 'OPEN'}
                        </span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Entries List */}
            <div className="card anim-up anim-up-4" style={{marginBottom:20}}>
              <div className="card-header">
                <div className="card-title">ALL ENTRIES</div>
                <span className="badge badge-pending">{players.length} TOTAL</span>
              </div>
              <div style={{padding:0}}>
                {players.length === 0 ? (
                  <div style={{padding:30, textAlign:'center', color:'var(--muted)', fontSize:14}}>
                    No entries yet.
                  </div>
                ) : (
                  players.map(player => (
                    <div key={player.id} className="player-row" style={{flexDirection:'column', alignItems:'flex-start', gap:8}}>
                      <div style={{display:'flex', alignItems:'center', gap:10, width:'100%', justifyContent:'space-between'}}>
                        <div style={{display:'flex', alignItems:'center', gap:10}}>
                          <span style={{fontWeight:700, fontSize:14, color:'var(--cream)'}}>{player.name}</span>
                          <span className={`badge ${player.status === 'alive' ? 'badge-alive' : 'badge-out'}`}>
                            {player.status}
                          </span>
                        </div>
                        <div style={{display:'flex', alignItems:'center', gap:8}}>
                          <span className="mono" style={{fontSize:12, color:'var(--gold)'}}>${player.totalSpent}</span>
                          <button
                            onClick={() => handleDeletePlayer(player.id, player.name)}
                            style={{
                              background:'rgba(248,113,113,.1)', border:'1px solid rgba(248,113,113,.25)',
                              color:'var(--danger)', borderRadius:6, padding:'3px 8px', fontSize:11,
                              cursor:'pointer', fontWeight:600, letterSpacing:'0.03em',
                            }}
                            onMouseOver={e => { e.currentTarget.style.background='rgba(248,113,113,.2)'; }}
                            onMouseOut={e => { e.currentTarget.style.background='rgba(248,113,113,.1)'; }}
                          >✕ DELETE</button>
                        </div>
                      </div>
                      {Object.keys(player.picks || {}).length > 0 && (
                        <div style={{display:'flex', flexDirection:'column', gap:6, width:'100%'}}>
                          {Object.entries(player.picks).map(([day, picks]) => (
                            <div key={day} style={{display:'flex', alignItems:'center', gap:6, flexWrap:'wrap'}}>
                              {editingPlayerId === player.id && editingDay === day ? (
                                <div style={{display:'flex', alignItems:'center', gap:6, flexWrap:'wrap', width:'100%'}}>
                                  <span style={{fontSize:11, color:'var(--muted)', fontWeight:700, minWidth:45}}>{DAY_LABELS[day]}:</span>
                                  {editingPicks.map((team, ti) => (
                                    <select key={ti} value={team}
                                      onChange={e => {
                                        const newPicks = [...editingPicks];
                                        newPicks[ti] = e.target.value;
                                        setEditingPicks(newPicks);
                                      }}
                                      style={{
                                        background:'var(--raised)', color:'var(--cream)', border:'1px solid rgba(255,184,0,.3)',
                                        borderRadius:4, padding:'3px 6px', fontSize:11, fontFamily:'Karla, sans-serif',
                                      }}>
                                      <option value="">Select...</option>
                                      {(teamsData[day] || []).map(t => (
                                        <option key={t} value={t}>{t}</option>
                                      ))}
                                    </select>
                                  ))}
                                  <button onClick={handleSaveEditPicks}
                                    style={{background:'rgba(74,222,128,.15)', border:'1px solid rgba(74,222,128,.3)',
                                      color:'var(--success)', borderRadius:4, padding:'2px 8px', fontSize:10,
                                      cursor:'pointer', fontWeight:700}}>SAVE</button>
                                  <button onClick={handleCancelEditPicks}
                                    style={{background:'rgba(248,113,113,.1)', border:'1px solid rgba(248,113,113,.25)',
                                      color:'var(--danger)', borderRadius:4, padding:'2px 8px', fontSize:10,
                                      cursor:'pointer', fontWeight:700}}>CANCEL</button>
                                </div>
                              ) : (
                                <div style={{display:'flex', alignItems:'center', gap:6, flexWrap:'wrap'}}>
                                  {picks.map((team, ti) => (
                                    <span key={`${day}-${ti}`} className={`badge ${getPickBadgeClass(team, day)}`} style={{fontSize:10}}>
                                      {DAY_LABELS[day]}: {team}
                                    </span>
                                  ))}
                                  <button onClick={() => handleStartEditPicks(player, day)}
                                    style={{background:'rgba(255,184,0,.08)', border:'1px solid rgba(255,184,0,.2)',
                                      color:'var(--gold)', borderRadius:4, padding:'2px 8px', fontSize:9,
                                      cursor:'pointer', fontWeight:700, letterSpacing:'0.03em'}}>EDIT</button>
                                </div>
                              )}
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  ))
                )}
              </div>
            </div>

            {/* Import / Export */}
            <div className="card anim-up anim-up-5">
              <div className="card-header">
                <div className="card-title">IMPORT / EXPORT DATA</div>
              </div>
              <div style={{padding:'22px'}}>
                <div style={{fontSize:13, color:'var(--muted)', marginBottom:16, lineHeight:1.6}}>
                  Export current data as JSON backup, or import a JSON file with games for the next day. You can also paste JSON manually.
                </div>

                <div style={{display:'flex', gap:10, marginBottom:16, flexWrap:'wrap'}}>
                  <button className="btn btn-gold" onClick={handleExport}>
                    Export Current Data
                  </button>
                  <label className="btn btn-ghost" style={{cursor:'pointer'}}>
                    📁 Load JSON File
                    <input type="file" accept=".json" style={{display:'none'}} onChange={handleImportFile} />
                  </label>
                  <button className="btn btn-primary" onClick={handleImport} disabled={!importJSON.trim()}>
                    Import Data
                  </button>
                </div>

                {importMsg && (
                  <div style={{color:'var(--success)', fontSize:13, marginBottom:12, padding:'10px 14px',
                               background:'rgba(74,222,128,.08)', border:'1px solid rgba(74,222,128,.2)', borderRadius:8}}>
                    {importMsg}
                  </div>
                )}
                {importErr && (
                  <div style={{color:'var(--danger)', fontSize:13, marginBottom:12, padding:'10px 14px',
                               background:'rgba(248,113,113,.08)', border:'1px solid rgba(248,113,113,.2)', borderRadius:8}}>
                    {importErr}
                  </div>
                )}

                <textarea
                  className="form-input"
                  value={importJSON}
                  onChange={e => setImportJSON(e.target.value)}
                  placeholder={'Paste JSON here to import, or click Export to fill this with current data...\n\nFormat:\n{\n  "players": [...],\n  "games": {...},\n  "config": { "currentDay": "...", "closedDays": [...] }\n}'}
                  style={{
                    width:'100%', minHeight:200, fontFamily:'Courier Prime, monospace',
                    fontSize:12, lineHeight:1.5, resize:'vertical',
                    background:'var(--raised)', color:'var(--text)',
                  }}
                />
              </div>
            </div>
          </div>
        )}

      </main>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
